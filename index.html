<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon Phase Finder</title>
    <style>
      @font-face {
        font-family: "Willow Stitch";
        src: url("https://github.com/Yoyo72099/Dynamic-systems/raw/refs/heads/main/WillowStitch.otf")
          format("opentype");
        font-weight: 400;
        font-style: normal;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Willow Stitch", "Trebuchet MS", "Arial Rounded MT Bold", sans-serif;
        background-image: url("https://github.com/Yoyo72099/Dynamic-systems/blob/main/back.png?raw=true");
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
        color: #2f2831;
        min-height: 100vh;
      }

      .container {
        max-width: 1180px;
        margin: 1.4rem auto;
        padding: 0 1rem;
        display: grid;
        gap: 1.2rem;
        grid-template-columns: 1fr 1fr;
      }

      .card {
        border-radius: 24px;
        padding: 1.2rem;
        background: #efe4d3;
        border: 2px solid #dbcab3;
        box-shadow:
          0 10px 28px rgba(35, 24, 19, 0.28),
          inset 0 2px 0 rgba(255, 250, 244, 0.7),
          inset 0 -2px 0 rgba(173, 143, 111, 0.35);
      }

      h1,
      h2 {
        margin: 0 0 0.8rem;
        color: #503c2d;
      }

      .panel-top {
        display: flex;
        justify-content: space-between;
        gap: 0.75rem;
        align-items: center;
        margin-bottom: 0.7rem;
      }

      .action-btn,
      button {
        border: none;
        border-radius: 14px;
        padding: 0.55rem 0.9rem;
        font-size: 0.92rem;
        background: #b58763;
        color: #fffaf0;
        font-weight: 700;
        cursor: pointer;
        box-shadow:
          inset 0 1px 0 rgba(255, 255, 255, 0.25),
          0 4px 10px rgba(64, 43, 25, 0.24);
      }

      .action-btn:hover,
      button:hover {
        background: #a67652;
      }

      .phase-wheel-wrap {
        margin: 0.7rem auto 0.85rem;
        width: 290px;
        height: 290px;
        border-radius: 50%;
        border: 2px dashed #c9b393;
        display: grid;
        place-items: center;
        background: rgba(255, 245, 231, 0.7);
      }

      .phase-wheel {
        width: 244px;
        height: 244px;
        position: relative;
        border-radius: 50%;
        transition: transform 900ms cubic-bezier(0.26, 0.86, 0.39, 1.1);
      }

      .wheel-item {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 56px;
        height: 56px;
        border-radius: 50%;
        overflow: hidden;
        border: 2px solid #f8ecdd;
        box-shadow: 0 3px 7px rgba(49, 35, 25, 0.2);
        transform-origin: center center;
      }

      .wheel-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .wheel-center {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 74px;
        height: 74px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        background: radial-gradient(circle at 40% 35%, #f8f0e3, #ccb494);
        border: 3px solid #ecdcca;
        z-index: 5;
      }

      .main-phase-image {
        width: 168px;
        height: 168px;
        margin: 0 auto 0.85rem;
        display: block;
        border-radius: 50%;
        object-fit: cover;
        border: 4px solid #f7ead8;
        box-shadow: 0 8px 16px rgba(51, 34, 24, 0.2);
        background: #f4e9d9;
      }

      .muted {
        margin: 0.2rem 0 0.75rem;
        color: #5f4b3d;
      }

      .phase-block {
        margin-bottom: 0.6rem;
      }

      .label {
        margin: 0 0 0.15rem;
        color: #7c5f4e;
        font-size: 0.88rem;
      }

      .value {
        margin: 0;
        font-size: 1.02rem;
        color: #2f2831;
        font-weight: 700;
      }

      form {
        display: flex;
        flex-wrap: wrap;
        gap: 0.55rem;
        margin-bottom: 0.65rem;
      }

      label {
        width: 100%;
        color: #594638;
        font-weight: 700;
      }

      input {
        flex: 1;
        min-width: 160px;
        border: 2px solid #dac7ae;
        border-radius: 13px;
        padding: 0.52rem 0.75rem;
        background: #fcf7ef;
        color: #413329;
        font-size: 0.95rem;
      }

      @media (max-width: 920px) {
        .container {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="container">
      <section class="card">
        <div class="panel-top">
          <h1>Tonight's Moon</h1>
          <button id="locate-btn" class="action-btn" type="button">Use My Location</button>
        </div>
        <p id="location-status" class="muted">Location not requested yet.</p>
        <p id="time-status" class="muted">Fetching current time from API...</p>

        <div class="phase-wheel-wrap">
          <div class="phase-wheel" id="current-wheel">
            <div class="wheel-center"></div>
          </div>
        </div>
        <img
          id="current-phase-image"
          class="main-phase-image"
          alt="Current moon phase image"
        />

        <div class="phase-block">
          <p class="label">Current Date</p>
          <p id="today-date" class="value">-</p>
        </div>
        <div class="phase-block">
          <p class="label">Current Moon Phase</p>
          <p id="tonight-phase" class="value">-</p>
        </div>
      </section>

      <section class="card">
        <h2>Birthday Moon Phase</h2>
        <form id="birthday-form">
          <label for="birthday">Enter your birthday</label>
          <input id="birthday" name="birthday" type="date" required />
          <button type="submit">Check</button>
        </form>

        <div class="phase-wheel-wrap">
          <div class="phase-wheel" id="birthday-wheel">
            <div class="wheel-center"></div>
          </div>
        </div>
        <img
          id="birthday-phase-image"
          class="main-phase-image"
          alt="Next birthday moon phase image"
        />

        <div class="phase-block">
          <p class="label">Moon phase on your birth date</p>
          <p id="birth-phase" class="value">-</p>
        </div>
        <div class="phase-block">
          <p class="label">Your next birthday date</p>
          <p id="next-birthday-date" class="value">-</p>
        </div>
        <div class="phase-block">
          <p class="label">Moon phase on your next birthday</p>
          <p id="next-birthday-phase" class="value">-</p>
        </div>
        <div class="phase-block">
          <p class="label">Time until your next birthday</p>
          <p id="countdown" class="value">-</p>
        </div>
      </section>
    </main>

    <script>
      const PHASE_ORDER = [
        "New Moon",
        "Full Moon",
        "First Quarter",
        "Waxing Gibbous",
        "Waxing Crescent",
        "Waning Gibbous",
        "Waning Crescent",
        "Last Quarter",
      ];

      const PHASE_IMAGES = {
        "New Moon": "https://github.com/Yoyo72099/Dynamic-systems/blob/main/new%20moon.PNG?raw=true",
        "Full Moon": "https://github.com/Yoyo72099/Dynamic-systems/blob/main/fullmoon.PNG?raw=true",
        "First Quarter":
          "https://github.com/Yoyo72099/Dynamic-systems/blob/main/first%20quarter.PNG?raw=true",
        "Waxing Gibbous":
          "https://github.com/Yoyo72099/Dynamic-systems/blob/main/Waxing%20Gibbous.PNG?raw=true",
        "Waxing Crescent":
          "https://github.com/Yoyo72099/Dynamic-systems/blob/main/Waxing%20Crescent%20.PNG?raw=true",
        "Waning Gibbous":
          "https://github.com/Yoyo72099/Dynamic-systems/blob/main/Waning%20Gibbous.PNG?raw=true",
        "Waning Crescent":
          "https://github.com/Yoyo72099/Dynamic-systems/blob/main/Waning%20Crescent.PNG?raw=true",
        "Last Quarter":
          "https://github.com/Yoyo72099/Dynamic-systems/blob/main/Last%20Quarter.PNG?raw=true",
      };

      const timeStatusEl = document.querySelector("#time-status");
      const locationStatusEl = document.querySelector("#location-status");
      const todayDateEl = document.querySelector("#today-date");
      const tonightPhaseEl = document.querySelector("#tonight-phase");
      const birthPhaseEl = document.querySelector("#birth-phase");
      const nextBirthdayDateEl = document.querySelector("#next-birthday-date");
      const nextBirthdayPhaseEl = document.querySelector("#next-birthday-phase");
      const countdownEl = document.querySelector("#countdown");
      const birthdayForm = document.querySelector("#birthday-form");
      const birthdayInput = document.querySelector("#birthday");
      const locateBtn = document.querySelector("#locate-btn");
      const currentWheel = document.querySelector("#current-wheel");
      const birthdayWheel = document.querySelector("#birthday-wheel");
      const currentPhaseImageEl = document.querySelector("#current-phase-image");
      const birthdayPhaseImageEl = document.querySelector("#birthday-phase-image");

      const monthCache = new Map();
      let currentDate = new Date();

      function buildWheel(wheelEl) {
        const radius = 98;
        const step = 360 / PHASE_ORDER.length;

        PHASE_ORDER.forEach((phase, index) => {
          const item = document.createElement("div");
          item.className = "wheel-item";
          const angle = index * step;
          item.style.transform = `translate(-50%, -50%) rotate(${angle}deg) translateY(-${radius}px) rotate(-${angle}deg)`;
          item.innerHTML = `<img src="${PHASE_IMAGES[phase]}" alt="${phase}" />`;
          wheelEl.appendChild(item);
        });
      }

      function setWheelPhase(wheelEl, phaseName, counterRotate = false) {
        const idx = PHASE_ORDER.indexOf(phaseName);
        if (idx < 0) return;
        const step = 360 / PHASE_ORDER.length;
        const angle = idx * step;
        const spin = counterRotate ? angle : -angle;
        wheelEl.style.transform = `rotate(${spin}deg)`;
      }

      function setMainPhaseImage(imgEl, phaseName) {
        const src = PHASE_IMAGES[phaseName] || PHASE_IMAGES["New Moon"];
        imgEl.src = src;
        imgEl.alt = `${phaseName} image`;
      }

      function formatDate(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(
          date.getDate(),
        ).padStart(2, "0")}`;
      }

      function normalizePhase(phaseName, lighting) {
        const lowerName = String(phaseName).toLowerCase();

        if (lowerName.includes("new")) return "New Moon";
        if (lowerName.includes("full")) return "Full Moon";
        if (lowerName.includes("first quarter")) return "First Quarter";
        if (lowerName.includes("last quarter")) return "Last Quarter";

        if (lowerName.includes("waxing")) return lighting < 50 ? "Waxing Crescent" : "Waxing Gibbous";
        if (lowerName.includes("waning")) return lighting > 50 ? "Waning Gibbous" : "Waning Crescent";

        return "New Moon";
      }

      async function fetchCurrentTime() {
        const zone = Intl.DateTimeFormat().resolvedOptions().timeZone || "Asia/Shanghai";
        const response = await fetch(
          `https://timeapi.io/api/Time/current/zone?timeZone=${encodeURIComponent(zone)}`,
        );

        if (!response.ok) throw new Error(`Time API request failed: ${response.status}`);
        return response.json();
      }

      async function fetchMoonPhaseByDate(date) {
        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();
        const monthKey = `${year}-${String(month).padStart(2, "0")}`;

        if (!monthCache.has(monthKey)) {
          const response = await fetch(
            `https://www.icalendar37.net/lunar/api/?lang=en&month=${month}&year=${year}`,
          );
          if (!response.ok) throw new Error(`Moon phase API request failed: ${response.status}`);
          monthCache.set(monthKey, await response.json());
        }

        const monthData = monthCache.get(monthKey);
        const dayData = monthData.phase[String(day)];
        if (!dayData) throw new Error("No moon phase data found for this date");

        const normalized = normalizePhase(dayData.phaseName, Number(dayData.lighting));
        return normalized;
      }

      function getNextBirthday(baseDate, birthdaySourceDate) {
        const year = baseDate.getFullYear();
        const month = birthdaySourceDate.getMonth();
        const day = birthdaySourceDate.getDate();
        let next = new Date(year, month, day);
        if (next < new Date(baseDate.getFullYear(), baseDate.getMonth(), baseDate.getDate())) {
          next = new Date(year + 1, month, day);
        }
        return next;
      }

      function daysUntil(fromDate, toDate) {
        const from = new Date(fromDate.getFullYear(), fromDate.getMonth(), fromDate.getDate());
        const to = new Date(toDate.getFullYear(), toDate.getMonth(), toDate.getDate());
        return Math.ceil((to - from) / (1000 * 60 * 60 * 24));
      }

      function requestLocation() {
        if (!navigator.geolocation) {
          locationStatusEl.textContent = "Geolocation is not supported in this browser.";
          return;
        }

        locationStatusEl.textContent = "Getting your location...";
        navigator.geolocation.getCurrentPosition(
          (position) => {
            const lat = position.coords.latitude.toFixed(4);
            const lon = position.coords.longitude.toFixed(4);
            locationStatusEl.textContent = `Your location: ${lat}, ${lon}`;
          },
          (error) => {
            locationStatusEl.textContent = `Location access failed: ${error.message}`;
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 },
        );
      }

      async function renderTonightInfo() {
        try {
          const timeData = await fetchCurrentTime();
          currentDate = new Date(
            timeData.year,
            timeData.month - 1,
            timeData.day,
            timeData.hour,
            timeData.minute,
            timeData.seconds,
          );

          timeStatusEl.textContent = `Current timezone: ${timeData.timeZone}, current time: ${timeData.dateTime}`;
          todayDateEl.textContent = formatDate(currentDate);

          const phase = await fetchMoonPhaseByDate(currentDate);
          tonightPhaseEl.textContent = phase;
          setWheelPhase(currentWheel, phase, false);
          setMainPhaseImage(currentPhaseImageEl, phase);
        } catch (error) {
          timeStatusEl.textContent = `Time API failed. Using local time. ${error.message}`;
          currentDate = new Date();
          todayDateEl.textContent = formatDate(currentDate);
        }
      }

      birthdayForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (!birthdayInput.value) return;

        const birthday = new Date(`${birthdayInput.value}T00:00:00`);
        if (Number.isNaN(birthday.getTime())) {
          birthPhaseEl.textContent = "Invalid birthday format";
          return;
        }

        try {
          const birthPhase = await fetchMoonPhaseByDate(birthday);
          birthPhaseEl.textContent = `${formatDate(birthday)}: ${birthPhase}`;

          const nextBirthday = getNextBirthday(currentDate, birthday);
          nextBirthdayDateEl.textContent = formatDate(nextBirthday);

          const nextBirthdayPhase = await fetchMoonPhaseByDate(nextBirthday);
          nextBirthdayPhaseEl.textContent = nextBirthdayPhase;
          countdownEl.textContent = `${daysUntil(currentDate, nextBirthday)} day(s)`;

          setWheelPhase(birthdayWheel, nextBirthdayPhase, true);
          setMainPhaseImage(birthdayPhaseImageEl, nextBirthdayPhase);
        } catch (error) {
          birthPhaseEl.textContent = `Query failed: ${error.message}`;
          nextBirthdayDateEl.textContent = "-";
          nextBirthdayPhaseEl.textContent = "-";
          countdownEl.textContent = "-";
        }
      });

      buildWheel(currentWheel);
      buildWheel(birthdayWheel);
      setWheelPhase(currentWheel, "New Moon", false);
      setWheelPhase(birthdayWheel, "New Moon", true);
      setMainPhaseImage(currentPhaseImageEl, "New Moon");
      setMainPhaseImage(birthdayPhaseImageEl, "New Moon");

      locateBtn.addEventListener("click", requestLocation);
      renderTonightInfo();
    </script>
  </body>
</html>
